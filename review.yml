reviews:
  - date: '2026-06-03'
    rating: 4
    summary: >-
      ETH Zurich has a genuine, well-documented public API footprint driven by
      the ETH Library. The ETH Library API Platform (Apigee-managed) exposes six
      OpenAPI 3.0 REST APIs — Discovery, ETHorama, Geo, Persons, Research
      Collection (v1/v2) and Vector — all behind a free one-time registration
      for an API key via developer.library.ethz.ch. The Swagger docs, the
      developer portal, the eth-library GitHub org (~40 repos including the
      opendata-apis OpenAPI specs), the Research Collection OAI-PMH endpoint,
      and the opendata.swiss organization page all resolve live (HTTP 200). No
      official ETH-published course/timetable or SIS API was found; the VVZ
      catalogue APIs that exist are unofficial community projects and were not
      cataloged. LinkedIn returns HTTP 999 (standard bot block) but the school
      page exists. No fabricated endpoints — only confirmed, live resources are
      listed.
